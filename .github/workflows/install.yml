name: Bench them all !

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: [push]
jobs:
  extract:
    name: Everything !
    runs-on: ubuntu-latest
    # permissions:
    #   id-token: write # Needed for auth with Deno Deploy
    #   contents: read # Needed to clone the repository

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Setup npm
        uses: actions/setup-node@v5
        with:
          node-version: 25
      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install hyperfine
        run: cargo install --locked hyperfine
      - name: install from scratch
        run: hyperfine --prepare "rm -rf node_modules && rm -rf deno.lock && deno clean && rm -rf bun.lock && rm -rf ~/.bun/install/cache && rm -rf pnpm-lock.yaml && pnpm cache delete && rm -rf package-lock.json && npm cache clean --force" --runs 4 "deno install" "bun install" "pnpm install" "npm install --no-audit --no-fund --loglevel=error"
      - name: install with node_modules and lockfile
        run: hyperfine --warmup 1 "deno install && bun install && pnpm install && npm install --no-audit --no-fund --loglevel=error" --runs 10 "deno install" "bun install" "pnpm install" "npm install --no-audit --no-fund --loglevel=error"
      - name: ci with node_modules and lockfile
        run: hyperfine "deno install --frozen" "bun install --frozen-lockfile" "pnpm install --frozen-lockfile" "npm ci --no-audit --no-fund --loglevel=error"
      - name: install one package
        run: hyperfine --runs 1 "deno add npm:zod" "bun install zod" "pnpm install zod" "npm install zod --no-audit --no-fund --loglevel=error" "deno add jsr:@zod/zod"
